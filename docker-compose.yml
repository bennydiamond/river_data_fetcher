version: '3.8'

services:
  river-monitor:
    image: ghcr.io/bennydiamond/river-monitor:latest
    container_name: river-monitor
    restart: unless-stopped
    volumes:
      - web-tmpfs:/usr/share/nginx/html
      - ${BACKUP_PATH:-./graph_backup}:/backup
      - type: tmpfs
        target: /opt/graph_automation
        tmpfs:
          size: 1m
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 64m
      - type: tmpfs
        target: /var/tmp
        tmpfs:
          size: 8m
    networks:
      - river-network
    environment:
      - FETCHER_INTERVAL_MINUTES=${FETCHER_INTERVAL_MINUTES:-10}
      - GRAPH_INTERVAL_MINUTES=${GRAPH_INTERVAL_MINUTES:-120}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - HA_TOKEN=${HA_TOKEN:-}
      - STATION_NUMBER=${STATION_NUMBER:-030315}
      - HA_API_BASE_URL=${HA_API_BASE_URL:-http://192.168.0.250:8123/api}
      - DATA_URL=${DATA_URL:-}
      - GRAPH_URL=${GRAPH_URL:-}
      - STATION_NAME_PREFIX=${STATION_NAME_PREFIX:-Upton}
      - RIVER_NAME=${RIVER_NAME:-}
      - RIVER_NAME_FALLBACK=${RIVER_NAME_FALLBACK:-Noire}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RESTART_ON_FAILURE=${RESTART_ON_FAILURE:-true}
      - RESTART_DELAY_SECONDS=${RESTART_DELAY_SECONDS:-5}
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - HOME=/tmp
      - XDG_CACHE_HOME=/tmp/.cache
    mem_limit: 800m
    mem_reservation: 400m
    cpus: 1.5
    shm_size: 256m
    logging:
      driver: syslog
      options:
        syslog-address: "udp://${SYSLOG_HOST:-192.168.0.15}:${SYSLOG_PORT:-514}"
        tag: "river-monitor"
        syslog-format: "rfc3164"

  web:
    image: nginx:alpine
    container_name: river-web
    restart: unless-stopped
    volumes:
      - web-tmpfs:/usr/share/nginx/html:ro
      - ${NGINX_CONFIG_PATH:-./nginx/nginx.conf}:/etc/nginx/nginx.conf:ro
      - type: tmpfs
        target: /var/cache/nginx
        tmpfs:
          size: 8m
      - type: tmpfs
        target: /var/run
        tmpfs:
          size: 2m
      - type: tmpfs
        target: /tmp
        tmpfs:
          size: 8m
    networks:
      - river-network
    ports:
      - "${WEB_PORT:-80}:80"
    mem_limit: 64m
    mem_reservation: 32m
    cpus: 0.25
    logging:
      driver: syslog
      options:
        syslog-address: "udp://${SYSLOG_HOST:-192.168.0.15}:${SYSLOG_PORT:-514}"
        tag: "river-web"
        syslog-format: "rfc3164"

networks:
  river-network:
    driver: bridge

volumes:
  web-tmpfs:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=64m,mode=0777"
